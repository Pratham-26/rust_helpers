name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Cancel in-flight runs for the same ref when a new commit lands.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # -----------------------------------------------------------------------
  # Rust unit tests (cheap, run once on Linux).
  # -----------------------------------------------------------------------
  rust-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: cargo test
        run: cargo test --release --locked

  # -----------------------------------------------------------------------
  # Build a wheel per platform/Python and run the Python test suite against
  # it. This is what proves each supported combo actually installs & works.
  # -----------------------------------------------------------------------
  build-and-test:
    needs: rust-tests
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-13, macos-14]
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build wheel (host)
        uses: PyO3/maturin-action@v1
        with:
          args: --release --interpreter python${{ matrix.python-version }}
          manylinux: auto

      - name: Install built wheel + deps
        shell: bash
        run: |
          pip install --upgrade pip
          # maturin-action drops wheels in target/wheels/.
          pip install target/wheels/polars_stringsim-*.whl
          pip install polars pytest

      - name: pytest
        run: pytest tests/python/ -v
